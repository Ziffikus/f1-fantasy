<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/f1-fantasy/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#E8002D" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="F1 TBE" />
    <link rel="apple-touch-icon" href="/f1-fantasy/icons/apple-touch-icon.svg" />
    <link rel="manifest" href="/f1-fantasy/manifest.json" />
    <title>F1 Fantasy – TBE</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700;800&family=Barlow:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <script>
      // GitHub Pages SPA redirect
      (function() {
        var p = window.location.search.match(/[?&]p=([^&]*)/);
        if (p) {
          var path = decodeURIComponent(p[1]);
          var h = window.location.search.match(/[?&]h=([^&]*)/);
          window.history.replaceState(null, null, '/f1-fantasy' + path + (h ? decodeURIComponent(h[1]) : ''));
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
